name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: node scripts/architecture-gates.mjs
      - run: npx vitest run          # unit + contract + component (node + jsdom projects)
      - run: npm run build
      # mobile-chromium uses the iPhone-13 device, which runs on WebKit — install both engines.
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test     # e2e + a11y (axe), desktop-chromium AND mobile (WebKit @360px)
      - run: npm audit --audit-level=high